id: no-typeof-string-check
language: TypeScript
severity: error
message: Use Predicate.isString() / Predicate.isNotString() from effect instead of typeof string checks.
files:
  - src/**/*.ts
rule:
  any:
    - pattern: 'typeof $VALUE === "string"'
    - pattern: 'typeof $VALUE !== "string"'
    - pattern: '"string" === typeof $VALUE'
    - pattern: '"string" !== typeof $VALUE'
    - pattern: "typeof $VALUE === 'string'"
    - pattern: "typeof $VALUE !== 'string'"
    - pattern: "'string' === typeof $VALUE"
    - pattern: "'string' !== typeof $VALUE"
