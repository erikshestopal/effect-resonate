id: no-tag-equality
language: TypeScript
severity: error
message: Use Predicate.isTagged() for tag guards or Match from effect for branching instead of direct _tag equality checks.
files:
  - src/**/*.ts
  - test/**/*.ts
rule:
  any:
    - pattern: $VALUE._tag === $TAG
    - pattern: $VALUE._tag !== $TAG
    - pattern: $TAG === $VALUE._tag
    - pattern: $TAG !== $VALUE._tag
